# P2 — Auto-refresh the OpenSubsidies maps data (D1 + Vectorize) when the
# grant-sources catalog changes. Does NOT redeploy the Worker (code deploys are
# separate); it only reloads data, which the live Worker reads immediately.
#
# Triggers: manual, a daily backstop, and a cross-repo dispatch from
# grant-sources (see the snippet in docs/p2-pipeline-setup.md).
#
# REQUIRED repo secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN  — CF dashboard → API Tokens → Create. Permissions:
#       Account › D1 Edit, Account › Vectorize Edit, Account › Workers AI Read.
#   CLOUDFLARE_ACCOUNT_ID — ba030de023c2b868979e9bb9d5e54a2d (Standahl@outlook.com)
#   REINDEX_KEY           — must equal the Worker's REINDEX_KEY secret
# (publicgrants/grants-sources is public, so no read token is needed.)

name: Refresh grant data

on:
  workflow_dispatch:
  repository_dispatch:
    types: [grant-sources-updated]
  schedule:
    - cron: "0 5 * * *" # daily 05:00 UTC backstop

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/maps
    steps:
      - name: Checkout opensubsidies
        uses: actions/checkout@v4

      - name: Checkout grants-sources (public)
        uses: actions/checkout@v4
        with:
          repository: publicgrants/grants-sources
          path: grant-sources-data

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: templates/maps/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Build D1 seed from grant-sources
        run: pnpm build:data
        env:
          GRANTS_SOURCES_DIR: ${{ github.workspace }}/grant-sources-data

      # data.sql DELETEs + re-INSERTs + rebuilds FTS (it does NOT drop tables, so
      # schema/indexes persist). NOTE: not yet atomic — there is a brief window
      # mid-reload; an atomic versioned swap is a future refinement.
      - name: Reload D1 data
        run: pnpm exec wrangler d1 execute opensubsidies-db --remote --file=scripts/.generated/data.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # funding.sql is self-seeding (CREATE TABLE IF NOT EXISTS) — it creates the
      # funding_* tables on first run, then DELETEs + re-INSERTs the rollups. It
      # does not touch funders/grants, so order vs. the data reload is irrelevant.
      - name: Reload D1 funding rollups
        run: pnpm exec wrangler d1 execute opensubsidies-db --remote --file=scripts/.generated/funding.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Re-embed documented grants into Vectorize
        run: node scripts/reindex-runner.mjs
        env:
          BASE_URL: https://opensubsidies.standahl.workers.dev
          REINDEX_KEY: ${{ secrets.REINDEX_KEY }}
