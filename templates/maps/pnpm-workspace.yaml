# Single-package "workspace". pnpm 10 (used by the Cloudflare build) treats the
# presence of this file as declaring a workspace and REQUIRES a `packages` field —
# without it `pnpm install` aborts with "packages field missing or empty". `.`
# makes the repo root itself the sole package. (pnpm 11, used locally, makes the
# field optional, so this is only strictly needed for the CI/CF pnpm 10 build.)
packages:
  - "."

allowBuilds:
  esbuild: set this to true or false
  msw: set this to true or false
  sharp: set this to true or false
  unrs-resolver: set this to true or false
  workerd: set this to true or false

# pnpm-11 settings (the old package.json `pnpm.onlyBuiltDependencies` field is
# no longer read). Permit the native post-install builds we rely on locally:
#   esbuild / unrs-resolver — used by tsx + next/eslint
#   workerd               — Cloudflare runtime for local D1 (wrangler/dev)
#   sharp                 — image optimisation
# msw is test-only and left unbuilt.
onlyBuiltDependencies:
  - esbuild
  - unrs-resolver
  - workerd
  - sharp

# Don't re-run an implicit install before `pnpm <script>`; it treats the
# "ignored build scripts" notice as a hard error otherwise.
verifyDepsBeforeRun: false
